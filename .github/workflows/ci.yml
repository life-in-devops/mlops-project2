name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 539188695824.dkr.ecr.ap-south-1.amazonaws.com
      - name: Build Docker image
        run: |
          docker build -t churn-model -f docker/Dockerfile .

      - name: Tag image.dkr.ecr.ap-south-1.amazonaws.com

        run: |
          docker tag churn-model:latest 539188695824.dkr.ecr.ap-south-1.amazonaws.com/churn-model:latest

      - name: Push image
        run: |
          docker push 539188695824.dkr.ecr.ap-south-1.amazonaws.com/churn-model:latest